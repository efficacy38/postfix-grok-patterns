services:

  # Run the grok pattern test suite (test/test.rb + test/*.yaml).
  # Usage: docker compose run --rm test-grok-patterns
  #
  # Note: initialise the logstash-patterns-core submodule first:
  #   git submodule update --init
  test-grok-patterns:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/runtests
    working_dir: /runtests
    command: ruby test/test.rb

  # Validate the Logstash filter config syntax.
  # Usage: docker compose run --rm test-config-syntax
  test-config-syntax:
    image: logstash:9.2.1
    volumes:
      - ./postfix.grok:/etc/logstash/patterns.d/postfix.grok:ro
      - ./50-filter-postfix.conf:/usr/share/logstash/pipeline/50-filter-postfix.conf:ro
    command: logstash --config.test_and_exit -f /usr/share/logstash/pipeline/50-filter-postfix.conf

  # Run Vector unit tests derived from the same test fixtures as the Logstash tests.
  # The generate_vector_tests.py script converts test/*.yaml to a Vector unit-test
  # config (vector/vector_tests.yaml) using VRL parse_groks() with the custom aliases
  # from postfix.grok.
  #
  # Run generate_vector_tests.py first (requires Python 3 on the host):
  #   python3 vector/generate_vector_tests.py
  #
  # References:
  #   Vector:              https://vector.dev/
  #   Vector unit tests:   https://vector.dev/docs/reference/configuration/unit-tests/
  #   VRL parse_groks:     https://vector.dev/docs/reference/vrl/functions/#parse_groks
  #
  # Usage: docker compose run --rm test-vector-patterns
  test-vector-patterns:
    build:
      context: .
      dockerfile: Dockerfile.vector
    volumes:
      - .:/runtests
    working_dir: /runtests
    command: vector test --config vector/vector_tests.yaml
