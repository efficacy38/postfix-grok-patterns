tests:
  - name: anvil_0001
    inputs:
      - insert_at: parse_postfix_anvil
        type: log
        log_fields:
          message: 'statistics: max cache size 1 at Oct 26 18:13:50'
    outputs:
      - extract_from: parse_postfix_anvil
        conditions:
          - type: vrl
            source: |-
              assert_eq!(.postfix_anvil_cache_size, "1", "anvil_0001: postfix_anvil_cache_size mismatch")
              assert_eq!(.postfix_anvil_timestamp, "Oct 26 18:13:50", "anvil_0001: postfix_anvil_timestamp mismatch")

  - name: anvil_0002
    inputs:
      - insert_at: parse_postfix_anvil
        type: log
        log_fields:
          message: 'statistics: max connection count 1 for (smtpd:61.238.241.86) at Oct 26 18:13:50'
    outputs:
      - extract_from: parse_postfix_anvil
        conditions:
          - type: vrl
            source: |-
              assert_eq!(.postfix_anvil_conn_count, "1", "anvil_0002: postfix_anvil_conn_count mismatch")
              assert_eq!(.postfix_anvil_timestamp, "Oct 26 18:13:50", "anvil_0002: postfix_anvil_timestamp mismatch")
              assert_eq!(.postfix_client_ip, "61.238.241.86", "anvil_0002: postfix_client_ip mismatch")
              assert_eq!(.postfix_service, "smtpd", "anvil_0002: postfix_service mismatch")

