          "POSTFIX_DISCARD": "%{POSTFIX_DISCARD_ANY}|%{POSTFIX_WARNING}",
          "POSTFIX_LMTP": "%{POSTFIX_SMTP}",
          "POSTFIX_PICKUP": "%{POSTFIX_KEYVALUE}",
