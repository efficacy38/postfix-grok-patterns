          "POSTFIX_BOUNCE_NOTIFICATION": "%{POSTFIX_QUEUEID:postfix_queueid}: %{POSTFIX_BOUNCE_RECIPIENT:postfix_bounce_recipient} %{POSTFIX_BOUNCE_REASON:postfix_bounce_reason} notification: %{POSTFIX_QUEUEID:postfix_bounce_queueid}",
          "POSTFIX_SCACHE_LOOKUPS": "statistics: (address|domain) lookup hits=%{INT:postfix_scache_hits} miss=%{INT:postfix_scache_miss} success=%{INT:postfix_scache_success}%",
