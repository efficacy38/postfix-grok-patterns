          "POSTFIX_ACTION": "(accept|defer|discard|filter|header-redirect|milter-reject|reject|reject_warning)",
          "POSTFIX_STATUS_CODE": "\\d{3}",
          "POSTFIX_STATUS_CODE_ENHANCED": "\\d\\.\\d+\\.\\d+",
