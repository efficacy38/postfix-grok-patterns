          "POSTFIX_CLEANUP_MESSAGEID": "%{POSTFIX_QUEUEID:postfix_queueid}: message-id=<?%{GREEDYDATA_NO_BRACKET:postfix_message-id}>?",
          "POSTFIX_QMGR_MESSAGE": "(removed|skipped, still being delivered)",
