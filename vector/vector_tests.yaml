          "POSTFIX_KEYVALUE_DATA": "[\\w-]+=[^;]*",
          "POSTFIX_KEYVALUE": "%{POSTFIX_QUEUEID:postfix_queueid}: %{POSTFIX_KEYVALUE_DATA:postfix_keyvalue_data}",
          "POSTFIX_TLSCONN": "%{DATA:postfix_tls_trustlevel} TLS connection established (to %{POSTFIX_RELAY}|from %{POSTFIX_CLIENT}): %{DATA:postfix_tls_version} with cipher %{DATA:postfix_tls_cipher} \\(%{DATA:postfix_tls_cipher_size} bits\\)( key-exchange %{DATA:postfix_tls_key_exchange} server-signature %{DATA:postfix_tls_server_signature} \\((%{INT:postfix_tls_server_signature_size} bits|%{POSTFIX_TLS_SERVER_SIGNATURE_CURVE:postfix_tls_server_signature_curve})\\)( server-digest %{DATA:postfix_tls_server_digest})?)?",
          "POSTFIX_TLSVERIFICATION": "certificate verification failed for %{POSTFIX_RELAY}: %{GREEDYDATA:postfix_tls_error}",
